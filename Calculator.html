</head>
<body>

    <header>

      <!-- NAV START -->
      <nav  class="navbar navbar-expand-lg shadow position-fixed top-0 start-0 end-0 z-10">
    <div class="container-fluid">
      <a class="navbar-brand fs-4 fw-semibold" href="#">Sahar Jwar</a>
      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

      </nav>
      <!-- NAV START -->

    </header>
  <!-- HEADER END -->

  <!-- MAIN START -->
   <main class="container-fluid d-flex align-items-center justify-content-center">
     <section class="card calculator-card p-4 mt-5 calc-main">
    <!-- Real-time Error Messaging Box -->
    <div id="errorBox" class="error-banner"></div>

    <!-- Calculator Screen -->
    <input type="text" id="display" class="form-control calc-display" value="0" readonly>
    
    <!-- Advanced Layout Grid -->
      <div class="container-fluid p-0">
        <!-- Row 1 -->
        <div class="row g-2 mb-2">
            <div class="col-3"><button class="btn btn-clear btn-calc w-100" onclick="clearDisplay()">C</button></div>
            <div class="col-3"><button class="btn btn-utility btn-calc w-100" onclick="backspace()">⌫</button></div>
            <div class="col-3"><button class="btn btn-utility btn-calc w-100" onclick="toggleSign()">±</button></div>
            <div class="col-3"><button class="btn btn-operator btn-calc w-100" onclick="appendOperator('/')">/</button></div>
        </div>
        
        <!-- Row 2 -->
        <div class="row g-2 mb-2">
            <div class="col-3"><button class="btn btn-num btn-calc w-100" onclick="appendNumber('7')">7</button></div>
            <div class="col-3"><button class="btn btn-num btn-calc w-100" onclick="appendNumber('8')">8</button></div>
            <div class="col-3"><button class="btn btn-num btn-calc w-100" onclick="appendNumber('9')">9</button></div>
            <div class="col-3"><button class="btn btn-operator btn-calc w-100" onclick="appendOperator('*')">×</button></div>
        </div>
        
        <!-- Row 3 -->
        <div class="row g-2 mb-2">
            <div class="col-3"><button class="btn btn-num btn-calc w-100" onclick="appendNumber('4')">4</button></div>
            <div class="col-3"><button class="btn btn-num btn-calc w-100" onclick="appendNumber('5')">5</button></div>
            <div class="col-3"><button class="btn btn-num btn-calc w-100" onclick="appendNumber('6')">6</button></div>
            <div class="col-3"><button class="btn btn-operator btn-calc w-100" onclick="appendOperator('-')">-</button></div>
        </div>
        
        <!-- Row 4 -->
        <div class="row g-2 mb-2">
            <div class="col-3"><button class="btn btn-num btn-calc w-100" onclick="appendNumber('1')">1</button></div>
            <div class="col-3"><button class="btn btn-num btn-calc w-100" onclick="appendNumber('2')">2</button></div>
            <div class="col-3"><button class="btn btn-num btn-calc w-100" onclick="appendNumber('3')">3</button></div>
            <div class="col-3"><button class="btn btn-operator btn-calc w-100" onclick="appendOperator('+')">+</button></div>
        </div>
        
        <!-- Row 5 -->
        <div class="row g-2">
            <div class="col-3"><button class="btn btn-num btn-calc w-100" onclick="appendNumber('0')">0</button></div>
            <div class="col-3"><button class="btn btn-num btn-calc w-100" onclick="appendDecimal('.')">.</button></div>
            <div class="col-3"><button class="btn btn-utility btn-calc w-100" onclick="applyPercentage()">%</button></div>
            <div class="col-3"><button class="btn btn-equal btn-calc w-100" onclick="calculate()">=</button></div>
        </div>
      </div>
    </section>
   </main>
  <!-- MAIN END -->
